<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Protegk IT Assessment{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg: #f3efe7;
            --bg-alt: #e7eef1;
            --surface: rgba(255, 255, 255, 0.88);
            --surface-strong: #ffffff;
            --text: #153047;
            --muted: #5c7285;
            --line: rgba(21, 48, 71, 0.1);
            --primary: #0f4c5c;
            --primary-strong: #0b3440;
            --accent: #c17a2c;
            --accent-soft: #f7e7d2;
            --success: #1f7a63;
            --shadow: 0 24px 70px rgba(13, 37, 58, 0.12);
            --radius-lg: 28px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Plus Jakarta Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, rgba(193, 122, 44, 0.16), transparent 26%),
                radial-gradient(circle at 88% 16%, rgba(15, 76, 92, 0.16), transparent 24%),
                linear-gradient(135deg, var(--bg) 0%, var(--bg-alt) 100%);
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.25) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.35), transparent 80%);
            pointer-events: none;
            opacity: 0.35;
        }
        .page-shell, .auth-shell { position: relative; z-index: 1; }
        .page-shell { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 36px 0 44px; }
        .auth-shell { min-height: 100vh; display: grid; place-items: center; padding: 24px 16px; }
        .panel {
            background: var(--surface);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.42);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }
        .auth-card { width: min(460px, 100%); overflow: hidden; }
        .auth-top, .hero-head {
            padding: 30px 32px;
            background: linear-gradient(135deg, var(--primary-strong), var(--primary));
            color: white;
        }
        .auth-top h1, .hero-title { margin: 10px 0 8px; letter-spacing: -0.04em; }
        .auth-top h1 { font-size: 2rem; }
        .hero-title { font-size: clamp(1.8rem, 3vw, 2.8rem); line-height: 1.05; }
        .auth-top p, .hero-copy { margin: 0; color: rgba(255,255,255,0.84); line-height: 1.6; }
        .hero-copy { margin-top: 10px; max-width: 700px; }
        .auth-body, .panel-body { padding: 28px 30px 30px; }
        .hero-eyebrow, .metric-label, .info-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--muted);
            font-weight: 700;
        }
        .hero-eyebrow { color: rgba(255,255,255,0.72); margin: 0 0 10px; }
        .brand-bar, .spaced {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .brand-bar { margin-bottom: 26px; }
        .brand-mark { display: inline-flex; align-items: center; gap: 12px; font-weight: 800; letter-spacing: -0.03em; }
        .brand-icon {
            width: 46px; height: 46px; border-radius: 14px; display: grid; place-items: center;
            background: linear-gradient(135deg, var(--primary), #1b7086); color: #fff;
            box-shadow: 0 14px 30px rgba(15, 76, 92, 0.22);
        }
        .brand-note, .helper-text, .section-copy, .auth-footer { color: var(--muted); line-height: 1.6; }
        .badge, .result-pill {
            display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px;
            border-radius: 999px; font-size: 0.82rem; font-weight: 700;
        }
        .badge { background: rgba(255,255,255,0.14); color: inherit; }
        .field { display: grid; gap: 8px; margin-bottom: 16px; }
        .field label { font-size: 0.92rem; font-weight: 700; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #7b8ea1; }
        .input-wrap input {
            width: 100%; border: 1px solid rgba(21,48,71,0.12); border-radius: 16px;
            padding: 14px 16px 14px 46px; font: inherit; background: #fff; color: var(--text);
        }
        .input-wrap input:focus { outline: none; border-color: rgba(15,76,92,0.5); box-shadow: 0 0 0 4px rgba(15,76,92,0.1); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; border: none; border-radius: 999px; padding: 14px 22px;
            font: inherit; font-weight: 800; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #18677a); color: #fff; box-shadow: 0 14px 30px rgba(15,76,92,0.2); }
        .btn-secondary { background: linear-gradient(135deg, var(--accent), #d28b3c); color: #fff; box-shadow: 0 14px 30px rgba(193,122,44,0.22); }
        .btn-ghost { background: rgba(255,255,255,0.72); color: var(--text); border: 1px solid var(--line); }
        .btn-block { width: 100%; }
        .alert { border-radius: 16px; padding: 14px 16px; margin-bottom: 18px; font-size: 0.95rem; line-height: 1.5; }
        .alert-error { background: #fdecec; color: #8f2c2c; border: 1px solid #f5c3c3; }
        .grid { display: grid; gap: 18px; }
        .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .info-card, .metric-card, .question-card, .status-card {
            background: var(--surface-strong);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: 0 10px 24px rgba(15,35,56,0.06);
        }
        .info-card, .metric-card, .status-card { padding: 20px; }
        .info-value, .metric-value { font-size: 1.08rem; font-weight: 700; line-height: 1.4; }
        .section-heading { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 0 16px; flex-wrap: wrap; }
        .section-heading h2, .section-heading h3 { margin: 0; letter-spacing: -0.03em; }
        .table-wrap { overflow: auto; border-radius: 20px; border: 1px solid var(--line); background: var(--surface-strong); }
        table { width: 100%; border-collapse: collapse; min-width: 760px; }
        th, td { padding: 16px 18px; text-align: left; border-bottom: 1px solid rgba(21,48,71,0.08); }
        th { background: #f4f7fa; color: var(--muted); font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; }
        tbody tr:hover { background: #fbfcfe; }
        .result-excellent { background: #daf4eb; color: #17644f; }
        .result-good { background: #e0ecff; color: #1f4e92; }
        .result-average { background: #fff0cf; color: #9a6c1c; }
        .result-low { background: #f9dede; color: #923636; }
        .result-pending { background: #eef1f5; color: #607284; }
        .question-card { padding: 22px 22px 18px; transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease; }
        .question-card:hover { transform: translateY(-2px); border-color: rgba(15,76,92,0.2); }
        .question-index {
            display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 12px;
            background: var(--accent-soft); color: #8e5b19; font-weight: 800; margin-bottom: 14px;
        }
        .question-card h3 { margin: 0 0 16px; font-size: 1.08rem; line-height: 1.55; }
        .options { display: grid; gap: 10px; }
        .option {
            display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1px solid var(--line);
            border-radius: 16px; cursor: pointer; background: #fff; transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }
        .option:hover { background: #fbfcfe; border-color: rgba(15,76,92,0.22); transform: translateX(2px); }
        .option input { accent-color: var(--primary); transform: scale(1.1); }
        .timer {
            position: sticky; top: 18px; margin-left: auto; width: fit-content; padding: 12px 18px; border-radius: 999px;
            background: linear-gradient(135deg, #b54545, #d15d5d); color: #fff; font-weight: 800; letter-spacing: 0.08em;
            box-shadow: 0 14px 26px rgba(181,69,69,0.25); z-index: 5;
        }
        .submission-icon {
            width: 88px; height: 88px; border-radius: 28px; display: grid; place-items: center;
            margin: 0 auto 18px; font-size: 2.1rem; color: #fff;
            background: linear-gradient(135deg, var(--success), #2c9e80); box-shadow: 0 20px 40px rgba(31,122,99,0.24);
        }
        .center { text-align: center; }
        @media (max-width: 820px) {
            .grid.two { grid-template-columns: 1fr; }
            .page-shell { width: min(100% - 20px, 1120px); padding-top: 20px; }
            .auth-top, .hero-head, .auth-body, .panel-body { padding-left: 22px; padding-right: 22px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    {% block extra_script %}{% endblock %}
</body>
</html>
